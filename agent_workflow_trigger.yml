name: Log One Tool Army

on:
workflow_dispatch:

env:
PROJECT_ID: tlg-business-intelligence-prd

jobs:

process-tickets:

```
runs-on: ubuntu-latest

permissions:
  contents: read

steps:

  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip

      pip install \
        pandas \
        requests \
        google-cloud-bigquery \
        google-cloud-bigquery-storage \
        google-auth \
        google-generativeai \
        pyarrow

  - name: Export credentials
    env:
      BI_BIGQUERY_CREDS: ${{ secrets.BI_BIGQUERY_CREDS }}
      ZENDESK_API_CREDENTIALS: ${{ secrets.ZENDESK_API_CREDENTIALS }}
    run: |
      echo "Credentials loaded"

  - name: Fetch Active Tickets
    env:
      BI_BIGQUERY_CREDS: ${{ secrets.BI_BIGQUERY_CREDS }}
      ZENDESK_API_CREDENTIALS: ${{ secrets.ZENDESK_API_CREDENTIALS }}
    run: |
      python ticket_fetcher.py

  - name: Execute Regex Engine
    env:
      BI_BIGQUERY_CREDS: ${{ secrets.BI_BIGQUERY_CREDS }}
    run: |
      python regex_engine.py

  - name: Execute Intent Detection
    env:
      BI_BIGQUERY_CREDS: ${{ secrets.BI_BIGQUERY_CREDS }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    run: |
      python intent_detection.py
