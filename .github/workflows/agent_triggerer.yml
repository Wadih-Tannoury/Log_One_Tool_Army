name: Log One Tool Army

on:
  workflow_dispatch:
    inputs:
      submit_zendesk_responses:
        description: "Submit final_response as public Zendesk ticket replies"
        required: true
        type: boolean
        default: false

jobs:
  process_requests:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      PROJECT_ID: tlg-business-intelligence-prd
      BI_BIGQUERY_CREDS: ${{ secrets.BI_BIGQUERY_CREDS }}
      ZENDESK_API_CREDENTIALS: ${{ secrets.ZENDESK_API_CREDENTIALS }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash
      GET_FULL_ORDER_API_CREDENTIALS: ${{ secrets.GET_FULL_ORDER_API_CREDENTIALS }}
      GENERATED_DOCUMENTS_DIR: generated_documents
      DOCUMENT_PUBLIC_BASE_URL: ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.ref_name }}
      LOG_HISTORY_TABLE: tlg-business-intelligence-prd.til.log_one_tool_army_logs_history
      SUBMIT_ZENDESK_RESPONSES: ${{ inputs.submit_zendesk_responses }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            pandas \
            numpy \
            requests \
            db-dtypes \
            pyarrow \
            google-auth \
            google-cloud-bigquery \
            google-cloud-bigquery-storage \
            google-genai \
            pymupdf

      - name: Initialize Workflow Run
        run: python -c "import uuid; print(f'WORKFLOW_RUN_ID={uuid.uuid4()}')" >> "$GITHUB_ENV"

      - name: Verify Environment
        run: |
          echo "Workflow started"
          echo "Project: $PROJECT_ID"
          echo "History table: $LOG_HISTORY_TABLE"
          echo "Workflow run id: $WORKFLOW_RUN_ID"
          echo "Zendesk response submission: $SUBMIT_ZENDESK_RESPONSES"

      - name: Fetch Tickets
        run: python ticket_fetcher.py

      - name: Run Regex Engine
        run: python regex_engine.py

      - name: Verify Regex Outputs
        run: |
          ls -lah output
          test -f output/regex_matches.jsonl.gz
          test -f output/unmatched_tickets.jsonl.gz

      - name: Run Intent Detection
        run: python intent_detection.py

      - name: Extract API-Backed Response Data and Documents
        run: python response_data_extractor.py

      - name: Persist Generated PDF Documents in Repository
        run: |
          if [ ! -d generated_documents ] || ! find generated_documents -type f -name '*.pdf' | grep -q .; then
            echo "No generated PDF documents to persist."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated_documents

          if git diff --cached --quiet; then
            echo "Generated PDF documents are already tracked and unchanged."
            exit 0
          fi

          git commit -m "Add generated customs documents for $WORKFLOW_RUN_ID"
          git push

      - name: Generate Responses, Log to BigQuery, and Optionally Reply in Zendesk
        run: python response_generator.py

      - name: Verify Local Handoffs
        run: |
          ls -lah output
          test -f output/request_intent_results.jsonl.gz

      - name: Upload Generated PDF Documents
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-customs-documents
          path: generated_documents
          if-no-files-found: ignore

      - name: Workflow Complete
        run: |
          echo "Pipeline completed successfully"
