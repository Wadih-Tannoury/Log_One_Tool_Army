name: Log One Tool Army

on:
  workflow_dispatch:

jobs:
  process_requests:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      PROJECT_ID: tlg-business-intelligence-prd
      BI_BIGQUERY_CREDS: ${{ secrets.BI_BIGQUERY_CREDS }}
      ZENDESK_API_CREDENTIALS: ${{ secrets.ZENDESK_API_CREDENTIALS }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: gemini-2.5-flash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip

          pip install \
            pandas \
            openpyxl \
            numpy \
            requests \
            db-dtypes \
            pyarrow \
            google-auth \
            google-cloud-bigquery \
            google-cloud-bigquery-storage \
            google-genai

      - name: Verify Environment
        run: |
          echo "Workflow started"
          echo "Project: $PROJECT_ID"

      - name: Fetch Tickets
        run: python ticket_fetcher.py

      - name: Run Regex Engine
        run: python regex_engine.py

      - name: Verify Regex Outputs
        run: |
          ls -lah output

      - name: Run Intent Detection
        run: python intent_detection.py

      - name: Generate Draft Responses
        run: python response_generator.py

      - name: Verify Final Output
        run: |
          ls -lah output
          test -f output/request_intent_results.xlsx

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: request-intent-results
          path: output/request_intent_results_with_drafts.xlsx
          if-no-files-found: error

      - name: Workflow Complete
        run: |
          echo "Pipeline completed successfully"
